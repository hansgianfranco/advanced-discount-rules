query RunInput {
  cart {
    lines {
      id
      quantity
      cost {
        amountPerQuantity {
          amount
        }
      }
      merchandise {
        __typename
        ... on ProductVariant {
          id
          product {
            id
            productType
            hasAnyTag(tags: ["curso", "especializacion", "Curso", "Especializacion", "Especialización"])
          }
        }
      }
    }
  }
}
